name: Request Codex Review

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  request-codex-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Request Codex review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          existing="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate --jq '.[] | select((.body // "" | ascii_downcase) | contains("@codex review")) | .id' | head -n 1 || true)"
          if [ -n "$existing" ]; then
            echo "Codex review has been requested."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "@codex review"
